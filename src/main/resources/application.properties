spring.application.name=ProjectCourseManagementSystem

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/projectmanagement}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:dra3user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dra3pass}
spring.datasource.driver-class-name=org.postgresql.Driver

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=8080